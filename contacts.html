  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #111;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
    }
    .header-logo { display: flex; align-items: center; }
    .header-logo svg { height: 36px; width: auto; }

    /* ─── CONTACTS BLOCK ─── */
    .contacts-wrap {
      max-width: 800px;
      margin: 60px auto;
      padding: 0 40px 80px;
    }
    .contacts-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 40px;
    }
    .contacts-grid {
      border: 1px solid rgba(255,255,255,0.18);
    }
    .contact-row {
      display: grid;
      grid-template-columns: 220px 1fr;
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-label {
      padding: 20px 24px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.4;
      border-right: 1px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
    }
    .contact-value {
      padding: 20px 24px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      display: flex;
      align-items: center;
    }

    @media (max-width: 600px) {
      header { padding: 0 20px; height: 56px; }
      .header-logo svg { height: 30px; }
      .contacts-wrap { margin: 36px auto; padding: 0 20px 60px; }
      .contact-row { grid-template-columns: 1fr; }
      .contact-label {
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.10);
        padding: 14px 18px 8px;
      }
      .contact-value { padding: 8px 18px 14px; }
    }
  </style>
</head>
